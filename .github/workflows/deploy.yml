name: Deploy Next App to VPS

on:
  push:
    branches:
      - master

  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Next.js app
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh

          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          echo "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" \
            "whoami && hostname"

      - name: Sync project files
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='.env' \
            --exclude='npm-debug.log*' \
            --exclude='yarn-error.log*' \
            -e "ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes -p ${{ secrets.SSH_PORT }}" \
            ./ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ secrets.DEPLOY_PATH }}/"

      - name: Build and restart app with PM2
        run: |
          ssh -i ~/.ssh/deploy_key \
            -o IdentitiesOnly=yes \
            -p "${{ secrets.SSH_PORT }}" \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" <<'EOF'
            set -euo pipefail

            APP_NAME="kenia"
            APP_DIR="${{ secrets.DEPLOY_PATH }}"
            PACKAGE_MANAGER="yarn"
            HEALTHCHECK_PATH="/api/root"
            export LANG=C
            export LC_ALL=C

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
            fi

            cd "$APP_DIR"

            if [ ! -f .env ]; then
              echo "ERROR: .env not found in $APP_DIR"
              exit 1
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "Node.js not found. Installing Node.js LTS..."

              NODE_CHANNEL="20.x"
              USE_NVM_NODE16="0"
              if command -v getconf >/dev/null 2>&1; then
                GLIBC_VERSION="$(getconf GNU_LIBC_VERSION 2>/dev/null | awk '{print $2}')"
                GLIBC_MAJOR="${GLIBC_VERSION%%.*}"
                GLIBC_MINOR="${GLIBC_VERSION#*.}"
                GLIBC_MINOR="${GLIBC_MINOR%%.*}"

                if [ "${GLIBC_MAJOR:-0}" -eq 2 ] && [ "${GLIBC_MINOR:-0}" -lt 28 ]; then
                  NODE_CHANNEL="16.x"
                  USE_NVM_NODE16="1"
                fi
              fi

              if [ "$USE_NVM_NODE16" = "1" ]; then
                echo "Old glibc detected; installing Node 16 via nvm."
                if ! command -v curl >/dev/null 2>&1; then
                  if command -v yum >/dev/null 2>&1; then
                    yum install -y curl
                  elif command -v dnf >/dev/null 2>&1; then
                    dnf install -y curl
                  elif command -v apt-get >/dev/null 2>&1; then
                    apt-get update && apt-get install -y curl
                  fi
                fi

                curl -fsSL https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.1/install.sh | bash
                . "$NVM_DIR/nvm.sh"
                nvm install 16
                nvm alias default 16

                NODE_BIN_DIR="$NVM_DIR/versions/node/$(nvm version default)/bin"
                ln -sf "$NODE_BIN_DIR/node" /usr/local/bin/node
                ln -sf "$NODE_BIN_DIR/npm" /usr/local/bin/npm
                [ -x "$NODE_BIN_DIR/npx" ] && ln -sf "$NODE_BIN_DIR/npx" /usr/local/bin/npx || true
              else
                echo "Using NodeSource channel: $NODE_CHANNEL"

                if command -v apt-get >/dev/null 2>&1; then
                  export DEBIAN_FRONTEND=noninteractive
                  apt-get update
                  apt-get install -y curl ca-certificates gnupg
                  mkdir -p /etc/apt/keyrings
                  curl -fsSL https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key | gpg --dearmor -o /etc/apt/keyrings/nodesource.gpg
                  echo "deb [signed-by=/etc/apt/keyrings/nodesource.gpg] https://deb.nodesource.com/node_${NODE_CHANNEL} nodistro main" > /etc/apt/sources.list.d/nodesource.list
                  apt-get update
                  apt-get install -y nodejs
                elif command -v dnf >/dev/null 2>&1; then
                  dnf install -y curl ca-certificates
                  curl -fsSL "https://rpm.nodesource.com/setup_${NODE_CHANNEL}" | bash -
                  dnf install -y nodejs
                elif command -v yum >/dev/null 2>&1; then
                  yum install -y curl ca-certificates
                  curl -fsSL "https://rpm.nodesource.com/setup_${NODE_CHANNEL}" | bash -
                  yum install -y nodejs
                else
                  echo "ERROR: unsupported package manager. Install Node.js manually."
                  exit 1
                fi
              fi
            fi

            if ! command -v node >/dev/null 2>&1; then
              echo "ERROR: Node.js installation failed."
              exit 1
            fi

            if ! command -v "$PACKAGE_MANAGER" >/dev/null 2>&1; then
              if command -v corepack >/dev/null 2>&1; then
                corepack enable || true
              fi
            fi

            if ! command -v "$PACKAGE_MANAGER" >/dev/null 2>&1; then
              if [ "$PACKAGE_MANAGER" = "yarn" ]; then
                npm install -g yarn
              else
                echo "ERROR: $PACKAGE_MANAGER is not installed on the server"
                exit 1
              fi
            fi

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            if [ -f yarn.lock ]; then yarn install --frozen-lockfile; else yarn install; fi
            yarn build

            if pm2 describe "$APP_NAME" >/dev/null 2>&1; then
              pm2 restart "$APP_NAME" --update-env
            else
              pm2 start "yarn start" --name "$APP_NAME" --time
            fi

            pm2 save

            if command -v curl >/dev/null 2>&1; then
              curl -fsS "http://127.0.0.1:3000$HEALTHCHECK_PATH" >/dev/null || true
            fi

            if [ -x /usr/local/cpanel/scripts/ea-nginx ]; then
              /usr/local/cpanel/scripts/ea-nginx clear_cache kenianavarrocom || true
              /usr/local/cpanel/scripts/ea-nginx reload || true
            fi
          EOF
